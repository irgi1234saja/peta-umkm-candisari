                    Pemetaan sayur organik serta omah kopi sumbing yang berlimpah nutrisi vulkanis langsung dari dataran tinggi Candisari.
                  </p>
                </div>
              </div>
            </div>
          </section>

          {/* INTERACTIVE PETA SEKSI */}
          <section id="peta" className="py-24 bg-[#FAF8F4] border-y border-amber-900/10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center max-w-3xl mx-auto mb-16 space-y-4">
                <span className="text-xs font-bold text-amber-600 tracking-widest uppercase block">Layanan E-Peta KKN</span>
                <h2 className="text-3xl sm:text-4xl font-serif font-black text-stone-950 tracking-tight">
                  E-Peta Interaktif Desa Candisari
                </h2>
                <p className="text-base text-stone-700 font-medium">
                  Membantu memetakan koordinat riil setiap UMKM. Klik pin pada peta untuk menampilkan katalog produk, kontak WhatsApp, serta navigasi rute Google Maps secara instan.
                </p>
              </div>

              {/* FILTER BAR */}
              <div className="bg-emerald-900 p-5 rounded-3xl shadow-xl border-2 border-amber-400 mb-10 flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4">
                <div className="relative flex-grow max-w-md">
                  <i data-lucide="search" className="absolute left-4 top-4 h-4 w-4 text-amber-300"></i>
                  <input 
                    type="text" 
                    placeholder="Padosi UMKM, produk atau asma pemilik..."
                    className="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-emerald-950 border border-emerald-800 text-white placeholder-emerald-300 focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>

                <div className="flex items-center space-x-2 overflow-x-auto pb-1 md:pb-0 scrollbar-none">
                  <i data-lucide="filter" className="w-4 h-4 text-amber-300 flex-shrink-0 mr-1"></i>
                  {CATEGORIES.map((cat) => (
                    <button
                      key={cat.id}
                      onClick={() => setSelectedCategory(cat.id)}
                      className={`px-4 py-2.5 rounded-2xl text-xs font-black transition-all flex-shrink-0 flex items-center space-x-1.5 ${
                        selectedCategory === cat.id 
                        ? 'bg-amber-400 text-stone-950 shadow-md border-2 border-white' 
                        : 'bg-emerald-950 hover:bg-emerald-900 text-white border border-emerald-800'
                      }`}
                    >
                      {cat.emoji && <span className="text-sm">{cat.emoji}</span>}
                      <span>{cat.name}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* MAP & PANEL */}
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch">
                <div className="lg:col-span-7 bg-[#FAF8F5] rounded-[2.5rem] border-2 border-amber-400 shadow-xl overflow-hidden min-h-[420px] sm:min-h-[500px] flex flex-col relative">
                  <div className="bg-emerald-900 text-white px-6 py-4 flex items-center justify-between border-b border-amber-400">
                    <div className="flex items-center space-x-2.5">
                      <span className="w-2.5 h-2.5 rounded-full bg-amber-300 animate-pulse"></span>
                      <span className="font-serif font-extrabold text-xs uppercase tracking-widest text-amber-300">Peta Geospasial Sumbing</span>
                    </div>
                    <span className="text-xs text-emerald-200 font-bold">Windusari, Magelang</span>
                  </div>

                  <div className="flex-grow relative bg-[#EBF3ED] overflow-hidden">
                    {/* SVG PETA */}
                    <svg className="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                      <rect width="100" height="100" fill="url(#javanese-grid)" />
                      <path d="M-10,35 Q20,10 50,45 T110,25 L110,110 L-10,110 Z" fill="rgba(16, 185, 129, 0.08)" />
                      <path d="M-10,55 Q35,40 68,68 T110,48 L110,110 L-10,110 Z" fill="rgba(245, 158, 11, 0.06)" />
                      <path d="M 15,0 Q 35,35 50,50 T 85,100" fill="none" stroke="rgba(245, 158, 11, 0.2)" strokeWidth="4.5" strokeLinecap="round" />
                      <path d="M 0,45 Q 45,45 50,50 T 100,55" fill="none" stroke="rgba(245, 158, 11, 0.2)" strokeWidth="3" strokeLinecap="round" />
                      <circle cx="50" cy="50" r="4.5" fill="rgba(16, 185, 129, 0.25)" />
                      <circle cx="25" cy="62" r="3.5" fill="rgba(245, 158, 11, 0.2)" />
                    </svg>

                    {/* Pin-pin UMKM */}
                    {filteredUMKM.map((umkm) => {
                      const isSelected = selectedUMKM.id === umkm.id;
                      return (
                        <button
                          key={umkm.id}
                          onClick={() => setSelectedUMKM(umkm)}
                          className="absolute z-10 -translate-x-1/2 -translate-y-1/2 transition-transform hover:scale-125"
                          style={{ left: `${umkm.coordinates.x}%`, top: `${umkm.coordinates.y}%` }}
                        >
                          <span className={`absolute top-0 left-0 w-8 h-8 rounded-full -translate-x-[25%] -translate-y-[25%] animate-ping opacity-50 ${isSelected ? 'bg-amber-500' : 'bg-emerald-500'}`}></span>
                          <div className={`w-9 h-9 rounded-full flex items-center justify-center border-2 shadow-lg ${
                            isSelected ? 'bg-amber-400 border-stone-950 scale-110' : 'bg-white border-emerald-600'
                          }`}>
                            <i data-lucide={umkm.icon === "Utensils" ? "utensils" : umkm.icon === "Coffee" ? "coffee" : umkm.icon === "Scissors" ? "scissors" : umkm.icon === "Sprout" ? "sprout" : "shopping-bag"} className="w-5 h-5"></i>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Detail UMKM */}
                <div className="lg:col-span-5 flex flex-col">
                  {selectedUMKM && (
                    <div className="bg-[#FCFBF8] rounded-[2.5rem] border-2 border-amber-400 shadow-xl overflow-hidden flex flex-col h-full">
                      <div className="h-52 relative overflow-hidden bg-stone-900">
                        <img src={selectedUMKM.image} alt={selectedUMKM.name} className="w-full h-full object-cover" />
                        <div className="absolute top-4 left-4">
                          <span className="bg-[#FCFBF8] text-emerald-800 text-xs font-black px-3.5 py-1.5 rounded-full shadow-md border-2 border-amber-400">
                            🌸 {selectedUMKM.category}
                          </span>
                        </div>
                      </div>

                      <div className="p-6 sm:p-8 flex-grow space-y-4">
                        <h3 className="text-xl sm:text-2xl font-serif font-black text-stone-950 leading-tight">{selectedUMKM.name}</h3>
                        <p className="text-xs text-amber-700 font-bold uppercase">Kagunganipun (Pemilik): {selectedUMKM.owner}</p>
                        <p className="text-sm text-stone-700 leading-relaxed font-medium">{selectedUMKM.description}</p>
                        
                        <div className="pt-4 border-t border-amber-900/10 space-y-3">
                          <div className="flex items-start space-x-3 text-xs text-stone-700">
                            <i data-lucide="shopping-bag" className="w-4.5 h-4.5 text-amber-500 flex-shrink-0"></i>
                            <div>
                              <strong className="block text-stone-900 font-bold font-serif">Katalog Produk Unggulan:</strong>
                              <span className="text-stone-600 font-semibold">{selectedUMKM.products}</span>
                            </div>
                          </div>
                          <div className="flex items-center space-x-3 text-xs text-stone-700">
                            <i data-lucide="clock" className="w-4.5 h-4.5 text-amber-500 flex-shrink-0"></i>
                            <div>
                              <strong className="inline-block text-stone-900 font-bold font-serif mr-1">Jam Operasional:</strong>
                              <span className="text-stone-600 font-semibold">{selectedUMKM.hours}</span>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div className="p-6 sm:p-8 bg-emerald-50 border-t-2 border-amber-400 space-y-3">
                        <div className="grid grid-cols-2 gap-3">
                          <a href={`https://wa.me/${selectedUMKM.phone}`} target="_blank" className="flex items-center justify-center space-x-2 bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-black py-3.5 px-4 rounded-xl border-2 border-white">
                            <i data-lucide="phone" className="w-4 h-4"></i>
                            <span>Kirim WhatsApp</span>
                          </a>
                          <a href={selectedUMKM.gmapsUrl} target="_blank" className="flex items-center justify-center space-x-2 bg-amber-400 hover:bg-amber-300 text-stone-950 text-xs font-black py-3.5 px-4 rounded-xl">
                            <i data-lucide="navigation" className="w-4 h-4"></i>
                            <span>Rute Navigasi</span>
                          </a>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>

          {/* GOOGLE MAPS DIRECT INTEGRATION */}
          <section id="gmaps-langsung" className="py-24 bg-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                <div className="lg:col-span-5 space-y-6">
                  <span className="text-xs font-bold text-amber-600 tracking-widest uppercase block">Aksesibilitas Geografis</span>
                  <h2 className="text-3xl sm:text-4xl font-serif font-black text-stone-950 tracking-tight leading-tight">
                    Terhubung Langsung dengan Google Maps Desa Candisari
                  </h2>
                  <p className="text-sm sm:text-base text-stone-600 leading-relaxed font-medium">
                    Secara geografis, Desa Candisari terletak di Kecamatan Windusari, Kabupaten Magelang, dikelilingi oleh pegunungan sejuk. Guna mempermudah kunjungan wisata fisik Anda, kami menyediakan integrasi Google Maps interaktif langsung ke lokasi desa kami.
                  </p>
                  <div className="pt-4">
                    <a href="https://www.google.com/maps/place/Candisari,+Windusari,+Magelang+Regency,+Central+Java" target="_blank" className="inline-flex items-center justify-center px-6 py-3.5 rounded-xl text-xs font-black text-white bg-emerald-700 hover:bg-emerald-800">
                      <span>Buka Aplikasi Google Maps</span>
                      <i data-lucide="external-link" className="w-4 h-4 ml-2 text-amber-300"></i>
                    </a>
                  </div>
                </div>

                <div className="lg:col-span-7 h-96 sm:h-[450px] rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-amber-400">
                  <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15817.800958190772!2d110.1895526871582!3d-7.382093099999994!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e7a88cf862e3d37%3A0xc0fb103bca3930b8!2sCandisari%2C%20Windusari%2C%20Magelang%2C%20Jawa%20Tengah!5e0!3m2!1sid!2sid!4v1710000000000!5m2!1sid!2sid" 
                    width="100%" 
                    height="100%" 
                    style={{ border: 0 }} 
                    allowFullScreen="" 
                    loading="lazy"
                  ></iframe>
                </div>
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer className="bg-emerald-950 text-[#FAF8F5] pt-16 pb-8 border-t-4 border-amber-400 mt-auto">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center sm:text-left">
              <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                <div className="space-y-4">
                  <span className="font-serif font-extrabold text-lg text-amber-300">Desa Candisari</span>
                  <p className="text-xs text-emerald-100 leading-relaxed">
                    Website digitalisasi pemetaan spasial UMKM binaan Program KKN Universitas Muhammadiyah Magelang untuk memajukan perekonomian kreatif mikro lokal.
                  </p>
                </div>
                <div>
                  <h4 className="font-serif font-bold text-xs text-amber-300 uppercase tracking-widest mb-4">Navigasi Utama</h4>
                  <ul className="space-y-2 text-xs text-emerald-100">
                    <li><a href="#hero" className="hover:underline">Beranda Utama</a></li>
                    <li><a href="#tentang" className="hover:underline">Tentang Budaya KKN</a></li>
                    <li><a href="#peta" className="hover:underline">Peta Digital Candisari</a></li>
                  </ul>
                </div>
                <div>
                  <h4 className="font-serif font-bold text-xs text-amber-300 uppercase tracking-widest mb-4">Klaster UMKM</h4>
                  <ul className="space-y-2 text-xs text-emerald-100">
                    <li>Daharan (Kuliner Lokal)</li>
                    <li>Kriya Anyaman Bambu</li>
                    <li>Kopi Arabika Sumbing</li>
                  </ul>
                </div>
                <div>
                  <h4 className="font-serif font-bold text-xs text-amber-300 uppercase tracking-widest mb-4">Tim Pengembang</h4>
                  <p className="text-xs text-emerald-100">
                    Dikerjakan dengan penuh dedikasi oleh Tim KKN Candisari 2026 Universitas Muhammadiyah Magelang.
                  </p>
                </div>
              </div>
              <div className="pt-8 border-t border-emerald-900 text-center text-xs text-emerald-300">
                &copy; 2026 Desa Candisari, Windusari, Magelang. Hak Cipta Dilindungi.
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
